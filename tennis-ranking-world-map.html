.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(

    [aria-selected=&quot;true&quot;],

  border-color: var(--primary);

  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

﻿&lt;div id=&quot;tennis-world-map&quot;&gt;
  &lt;style&gt;
    #tennis-world-map { color: var(--foreground); width: 100%; }
    #tennis-world-map .toolbar { display: flex; flex-wrap: wrap; align-items: end; justify-content: space-between; gap: 12px 20px; margin-bottom: 10px; }
    #tennis-world-map .tour-group { display: flex; gap: 6px; }
    #tennis-world-map .view-group { display: flex; flex-wrap: wrap; gap: 6px; }
    #tennis-world-map .age-group { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 8px; }
    #tennis-world-map .age-group[hidden] { display: none; }
    #tennis-world-map .rank-field { flex: 1 1 280px; max-width: 460px; }
    #tennis-world-map .rank-line { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
    #tennis-world-map .map-wrap { position: relative; width: 100%; }
    #tennis-world-map .world-map { display: block; width: 100%; height: auto; min-height: 260px; }
    #tennis-world-map .country { stroke: var(--background); stroke-width: .7; vector-effect: non-scaling-stroke; transition: fill 180ms ease, opacity 180ms ease; }
    #tennis-world-map .country[data-count=&quot;0&quot;] { fill: var(--muted); opacity: .42; }
    #tennis-world-map .country[data-count]:not([data-count=&quot;0&quot;]) { cursor: pointer; }
    #tennis-world-map .country.is-selected { stroke: var(--foreground); stroke-width: 1.8; }
    #tennis-world-map .tooltip { position: absolute; visibility: hidden; pointer-events: none; transform: translate(-50%, -112%); white-space: nowrap; }
    #tennis-world-map .detail { margin-top: 10px; padding: 12px 14px; }
    #tennis-world-map .detail-head { display: flex; flex-wrap: wrap; gap: 8px 18px; align-items: baseline; }
    #tennis-world-map .detail strong { font-weight: 500; }
    #tennis-world-map .player-list { columns: 3 180px; column-gap: 28px; margin: 12px 0 0; padding-left: 24px; }
    #tennis-world-map .player-list li { break-inside: avoid; margin-bottom: 5px; }
    #tennis-world-map .legend { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    #tennis-world-map .mode-note { margin: 0 0 8px; }
    #tennis-world-map .data-note { margin-top: 8px; }
    #tennis-world-map .coverage-chart { margin: 12px 0; }
    #tennis-world-map .coverage-chart[hidden] { display: none; }
    #tennis-world-map .coverage-title { margin-bottom: 8px; font-weight: 500; }
    #tennis-world-map .coverage-row { display: grid; grid-template-columns: minmax(120px, 1fr) 4fr 32px; gap: 8px; align-items: center; margin: 6px 0; }
    #tennis-world-map .coverage-track { height: 12px; background: var(--muted); }
    #tennis-world-map .coverage-fill { height: 100%; width: 0; transition: width 180ms ease; }
    #tennis-world-map .coverage-verified { background: var(--viz-series-1); }
    #tennis-world-map .coverage-inferred { background: var(--viz-series-2); }
    #tennis-world-map .coverage-unknown { background: var(--viz-series-4); }
    #tennis-world-map .coverage-outside { background: var(--viz-series-3); }
    #tennis-world-map .legend-bar { width: 140px; height: 9px; background: linear-gradient(90deg, color-mix(in srgb, var(--viz-series-1) 15%, var(--muted)), var(--viz-series-1)); }
    @media (max-width: 520px) { #tennis-world-map .toolbar { align-items: stretch; } #tennis-world-map .rank-field { flex-basis: 100%; max-width: none; } }
    @media (prefers-reduced-motion: reduce) { #tennis-world-map .country { transition: none; } }
  &lt;/style&gt;

  &lt;div class=&quot;toolbar&quot;&gt;

&lt;script&gt;
(() =&gt; {

  const skipDelay = 300;

  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
